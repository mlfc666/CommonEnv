<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniFramework 生产级测试面板</title>
    <link rel="preconnect" href="https://challenges.cloudflare.com">
    <!-- 1. 显式渲染脚本 -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; }
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1rem; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; margin-bottom: 8px; color: #fff; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        #cf-container { margin-bottom: 10px; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 12px; min-height: 80px; }
        .token-tag { font-size: 12px; color: var(--success); display: none; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="grid">
    <!-- 认证卡片 -->
    <div class="card">
        <h2>1. 认证 (Auth)</h2>
        <input type="text" id="username" placeholder="用户名" value="admin">
        <input type="password" id="password" placeholder="密码" value="123456">

        <div id="cf-container"></div>

        <div id="token-status" class="token-tag">✓ 已持有有效 Token</div>
        <button class="btn-blue" onclick="handleAuth('register')">注册</button>
        <button class="btn-green" onclick="handleAuth('login')">登录</button>
    </div>

    <!-- 用户卡片 -->
    <div class="card">
        <h2>2. 用户 (User)</h2>
        <button class="btn-blue" onclick="callApi('api/user/info', 'GET')">获取个人资料</button>
        <input type="file" id="avatar-input">
        <button class="btn-green" onclick="uploadAvatar()">更新头像</button>
        <button class="btn-red" onclick="logout()">注销登录</button>
    </div>

    <!-- 备忘录卡片 -->
    <div class="card" style="grid-column: span 2;">
        <h2>3. 业务 (Memo)</h2>
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <input type="text" id="memo-title" placeholder="标题">
                <textarea id="memo-content" rows="3" placeholder="内容..."></textarea>
                <input type="text" id="memo-tags" placeholder="标签 (用逗号隔开)">
                <button class="btn-blue" onclick="createMemo()">保存记录</button>
            </div>
            <div style="flex: 1;">
                <input type="text" id="search-key" placeholder="搜索关键字">
                <button class="btn-green" onclick="listMemos()">查询列表</button>
            </div>
        </div>
    </div>

    <!-- 控制台 -->
    <div class="card" style="grid-column: span 2;">
        <h2>系统响应监控</h2>
        <pre id="console-output">等待指令...</pre>
    </div>
</div>

<script>
    let widgetId;
    const siteKey = '0x4AAAAAACnWdLj7v2MmY7cI'; // 务必替换

    // 初始化 Turnstile
    window.onload = function() {
        if (typeof turnstile !== 'undefined') {
            widgetId = turnstile.render('#cf-container', {
                sitekey: siteKey,
                appearance: 'always'
            });
        }
        checkTokenStatus();
    };

    function checkTokenStatus() {
        const token = localStorage.getItem('jwt_token');
        document.getElementById('token-status').style.display = token ? 'block' : 'none';
    }

    // 核心修复：前端哈希算法
    async function hashPassword(pwd) {
        const encoder = new TextEncoder();
        const data = encoder.encode(pwd);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // 核心修复：通用 API 调用
    async function callApi(path, method, body = null, isMultipart = false) {
        const output = document.getElementById('console-output');
        const token = localStorage.getItem('jwt_token');

        console.log(`[DEBUG] 请求路径: ${path}, 内存中的 Token:`, token);

        const headers = {};
        if (token && token !== "null" && token !== "undefined") {
            headers['Authorization'] = `Bearer ${token}`; // 注意此处有空格
        }

        if (!isMultipart) {
            headers['Content-Type'] = 'application/json';
        }

        const options = { method, headers };
        if (body) {
            options.body = isMultipart ? body : JSON.stringify(body);
        }

        try {
            const res = await fetch(path, options);
            const data = await res.json();

            // 在网页 Console 区域显示格式化后的 JSON
            output.innerText = JSON.stringify(data, null, 2);
            return data;
        } catch (e) {
            output.innerText = "网络请求崩溃:" + e.message;
            return null;
        }
    }

    // 登录与注册
    async function handleAuth(type) {
        const cfToken = turnstile.getResponse(widgetId);
        if (!cfToken) return alert("请先完成人机验证");

        // 对密码进行 SHA-256 哈希，确保注册和登录的底数一致
        const hashedPassword = await hashPassword(document.getElementById('password').value);

        const payload = {
            username: document.getElementById('username').value,
            password: hashedPassword,
            cfToken: cfToken
        };

        const res = await callApi(`api/user/${type}`, 'POST', payload);

        // 关键修复：res.data 本身就是 Token 字符串
        if (res && res.code === 200) {
            const token = res.data;
            console.log("获取到 Token:", token);

            localStorage.setItem('jwt_token', token);
            checkTokenStatus(); // 更新界面状态显示
            alert(type === 'register' ? "注册成功并已自动登录" : "登录成功");
        } else {
            alert("操作失败: " + (res ? res.message : "未知错误"));
        }
    }

    async function uploadAvatar() {
        const file = document.getElementById('avatar-input').files[0];
        if (!file) return alert("请选择文件");
        const fd = new FormData();
        fd.append('avatar', file);
        await callApi('api/user/upload-avatar', 'POST', fd, true);
    }

    async function createMemo() {
        const tags = document.getElementById('memo-tags').value.split(',').filter(t => t.trim());
        await callApi('api/memo/create', 'POST', {
            title: document.getElementById('memo-title').value,
            content: document.getElementById('memo-content').value,
            tags: tags
        });
    }

    async function listMemos() {
        await callApi('api/memo/list', 'POST', {
            keyword: document.getElementById('search-key').value,
            page: 1, size: 10
        });
    }

    async function logout() {
        const res = await callApi('api/user/logout', 'POST');
        localStorage.removeItem('jwt_token');
        location.reload();
    }
</script>
</body>
</html>
